; Race Dash - STM32 Firmware
; PlatformIO configuration for STM32F103RCT6
;
; UPLOAD: Requires ST-Link V2 programmer (~$3)
;   Connect: SWDIO, SWCLK, 3.3V, GND
;   Or use USB DFU bootloader (hold BOOT0 high during reset)
;
; BUILD:
;   pio run              (compile only)
;   pio run -t upload    (compile + flash)
;   pio device monitor   (serial monitor on Pi UART)

[env:stm32_racedash]
platform = ststm32
board = genericSTM32F103RC
framework = arduino


; Upload via ST-Link (default)
upload_protocol = stlink

; Or upload via serial bootloader (uncomment below, comment stlink above):
; upload_protocol = serial
; upload_port = /dev/ttyUSB0

; Libraries
lib_deps =
    arduino-libraries/SD
    mikalhart/TinyGPSPlus@^1.0.3
    ; Uncomment when ready:
    ; nRF24/RF24@^1.4.7
    ; pazi88/STM32_CAN@^1.1.0

; Serial monitor
monitor_speed = 115200
monitor_port = /dev/ttyAMA0

; Build flags
build_flags =
    -D SERIAL_USB           ; Enable USB serial for debug if connected
    -D LED_BUILTIN=PC13
